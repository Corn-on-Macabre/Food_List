server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # App shell must always be fresh — it references the hashed bundles
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
  }

  # Restaurant data changes between visits — curator updates must show immediately
  location = /restaurants.json {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
  }

  # Service worker must never be long-cached — browsers check it for updates,
  # and a stale SW pins users to old caching behavior for up to 24h.
  # (Exact-match location wins over the regex .js rule below.)
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
  }

  # Vite content-hashed assets are immutable — cache for a year
  location ~* \.(js|css)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
