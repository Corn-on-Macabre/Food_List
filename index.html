<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F4F2EE" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#191316" media="(prefers-color-scheme: dark)" />
    <script>
      // Apply the theme before first paint to avoid a light-mode flash.
      // Mirrors the resolution logic in src/hooks/useTheme.ts.
      try {
        var stored = localStorage.getItem('food-list-theme');
        var dark = stored === 'dark' || (stored !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) { /* storage unavailable — default to system via CSS */ }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="Bobby's curated restaurant map. Explore loved spots, recommended eats, and places on the radar." />
    <meta property="og:title" content="bobby.menu" />
    <meta property="og:description" content="Bobby's curated restaurant map" />
    <meta property="og:type" content="website" />
    <title>bobby.menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:wght@400;700&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
